aid: national-institute-of-standards-and-technology
name: National Institute of Standards and Technology
description: NIST promotes U.S. innovation and industrial competitiveness by advancing measurement science, standards, and
  technology in ways that enhance economic security and improve our quality of life. NIST operates the National Vulnerability
  Database (NVD), which provides public APIs for CVE, CVE change history, and CPE records.
