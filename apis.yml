    description: The NVD API provides programmatic access to Common Vulnerabilities and Exposures (CVE) records, CVE change
      history, and Common Platform Enumeration (CPE) records. Endpoints support pagination, filtering by CVSS metrics, CWE IDs,
      KEV catalog membership, source identifiers, and publication or modification date ranges.
